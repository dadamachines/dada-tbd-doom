[platformio]
default_envs = doom-tbd16

[env:doom-tbd16]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = generic_rp2350
framework = picosdk
board_build.core = earlephilhower

extra_scripts =
    pre:doom_build.py
    post:append_wad_uf2.py

; Doom sources are managed by doom_build.py — don't auto-discover lib/
lib_ldf_mode = off

; Only build the stub in src/ — real sources come from doom_build.py
build_src_filter =
    -<*>
    +<doom_stub.c>
    +<i_picosound.c>
    +<pico_audio_bridge.c>
    +<config.h>
    +<psram_init.c>
    +<sd_wad_loader.c>
    +<pio_spi_oled.c>
    +<p4_spi_transport.c>
    +<p4_control_link.c>

build_flags =
    ; ===================================================================
    ; Board / Platform
    ; ===================================================================
    -DJTBD16=1
    -DPICO_BOARD=\"jtbd16\"
    -DPICO_ON_DEVICE=1
    -DPICO_BUILD=1

    ; ===================================================================
    ; small_doom_common (from CMakeLists.txt lines 326-470)
    ; ===================================================================
    -DSHRINK_MOBJ=1
    -DDOOM_ONLY=1
    -DDOOM_SMALL=1
    -DDOOM_CONST=1
    -DSOUND_LOW_PASS=0
    -DAUDIO_TEST_TONES=0
    -DNUM_SOUND_CHANNELS=8
    -DNO_USE_CHECKSUM=1
    -DNO_USE_RELOAD=1
    -DUSE_SINGLE_IWAD=1
    -DNO_USE_WIPE=1
    -DNO_USE_JOYSTICK=1
    -DNO_USE_DEH=1
    -DNO_USE_MUSIC_PACKS=1
    -DUSE_FLAT_MAX_256=1
    -DUSE_MEMMAP_ONLY=1
    -DUSE_LIGHTMAP_INDEXES=1
    -DNO_USE_ENDDOOM=1
    -DUSE_ERASE_FRAME=1
    -DNO_DRAW_MID=1
    -DNO_DRAW_TOP=1
    -DNO_DRAW_BOTTOM=1
    -DNO_DRAW_MASKED=1
    -DNO_DRAW_SKY=1
    -DNO_DRAW_SPRITES=1
    -DNO_DRAW_PSPRITES=1
    -DNO_VISPLANE_GUTS=1
    -DNO_VISPLANE_CACHES=1
    -DNO_DRAWSEGS=1
    -DNO_VISSPRITES=1
    -DNO_MASKED_FLOOR_CLIP=1
    -DPD_DRAW_COLUMNS=1
    -DPD_DRAW_MARKERS=1
    -DPD_DRAW_PLANES=1
    -DPD_SCALE_SORT=1
    -DPD_CLIP_WALLS=1
    -DPD_QUANTIZE=1
    -DPD_SANITY=1
    -DPD_COLUMNS=1
    -DPICO_DOOM=1
    -DNO_USE_DS_COLORMAP=1
    -DNO_USE_DC_COLORMAP=1
    -DUSE_READONLY_MMAP=1
    ; Music
    -DNO_USE_TIMIDITY=1
    -DNO_USE_GUS=1
    -DNO_USE_LIBSAMPLERATE=1
    -DEMU8950_NO_WAVE_TABLE_MAP=1
    -DEMU8950_NO_TLL=1
    -DEMU8950_NO_FLOAT=1
    -DEMU8950_NO_TIMER=1
    -DEMU8950_NO_TEST_FLAG=1
    -DEMU8950_SIMPLER_NOISE=1
    -DEMU8950_SHORT_NOISE_UPDATE_CHECK=1
    -DEMU8950_LINEAR_SKIP=1
    -DEMU8950_LINEAR_END_OF_NOTE_OPTIMIZATION
    -DEMU8950_NO_PERCUSSION_MODE=1
    -DEMU8950_LINEAR=1
    -DEMU8950_ASM=1
    ; Flash size
    -DNO_USE_STATE_MISC
    ; RAM size
    -DUSE_RAW_MAPNODE=1
    -DUSE_RAW_MAPVERTEX=1
    -DUSE_RAW_MAPSEG=1
    -DUSE_RAW_MAPLINEDEF=1
    -DUSE_RAW_MAPTHING=1
    -DUSE_INDEX_LINEBUFFER=1
    -DNO_USE_ZLIGHT=1
    -DNO_Z_ZONE_ID=1
    -DZ_MALOOC_EXTRA_DATA=1
    -DUSE_THINKER_POOL=1
    -DNO_INTERCEPTS_OVERRUN=1
    ; Immutable
    -DTEMP_IMMUTABLE_DISABLED=1
    -DUSE_CONST_SFX=1
    -DUSE_CONST_MUSIC=1
    -DNO_DEMO_RECORDING=1
    -DPICO_NO_TIMING_DEMO=1
    -DNO_USE_EXIT=1
    -DPICO_DEBUG_PIN_BASE=18
    -DPICO_DEBUG_PIN_COUNT=2

    ; ===================================================================
    ; doom_tiny target (from CMakeLists.txt lines 500-590)
    ; ===================================================================
    -DDOOM_TINY=1
    -DEMU8950_SLOT_RENDER=1
    -DNO_RDRAW=1
    -DPICO_TIME_DEFAULT_ALARM_POOL_DISABLED=1
    -DPICO_TIME_DEFAULT_ALARM_POOL_MAX_TIMERS=1
    -DPICO_USE_OPTIMISTIC_SBRK=1
    -DUSE_EMU8950_OPL=1
    -DUSE_DIRECT_MIDI_LUMP=1
    -DNO_USE_NET=1
    -DPICO_SCANVIDEO_SCALING_NEAREST=1
    -DPICO_FRANTIC_GREYSCALE=1
    -DDOOM_LOWRES=1
    -DNO_USE_LOAD=1
    -DNO_USE_SAVE=1
    -DNO_FILE_ACCESS=1
    -DSAVE_COMPRESSED=1
    -DLOAD_COMPRESSED=1
    -DNO_USE_ARGS=1
    -DNO_USE_SAVE_CONFIG=1
    -DNO_USE_FLOAT=1
    -DUSE_VANILLA_KEYBOARD_MAPPING_ONLY=1
    -DNO_USE_LOADING_DISK=1
    -DUSE_WHD=1
    -DNO_Z_MALLOC_USER_PTR=1
    -DFLOOR_CEILING_CLIP_8BIT=1
    -DUSE_MUSX=1
    -DMUSX_COMPRESSED=1
    -DNO_SCREENSHOT=1
    -DNO_USE_BOUND_CONFIG=1
    -DUSE_FPS=1
    -DUSE_MEMORY_WAD=1
    -DEMU8950_NO_RATECONV=1
    -DPICO_CORE1_STACK_SIZE=0x4f8
    -DNO_IERROR=1
    -DNO_ZONE_DEBUG=1

    ; ===================================================================
    ; render_newhope (from CMakeLists.txt lines 620-636)
    ; ===================================================================
    -DPICODOOM_RENDER_NEWHOPE=1
    -DMERGE_DISTSCALE0_INTO_VIEWCOSSINANGLE=1
    -DPICO_SCANVIDEO_MAX_SCANLINE_BUFFER_WORDS=164

    ; ===================================================================
    ; tiny_settings (from CMakeLists.txt lines 643-648)
    ; ===================================================================
    -DWHD_SUPER_TINY=1
    -DDEMO1_ONLY=1
    -DNO_USE_FINALE_CAST=1
    -DNO_USE_FINALE_BUNNY=1

    ; ===================================================================
    ; common_pico (from pico/CMakeLists.txt)
    ; ===================================================================
    -DPICO_HEAP_SIZE=0
    -DUSE_ZONE_FOR_MALLOC=1
    -DNO_USE_MOUSE=1
    -DPICO_AUDIO_I2S_PIO=1
    -DPICO_AUDIO_I2S_DMA_IRQ=1
    -DLIB_PICO_STDLIB=1
    -DPICO_STDIO_USB=0
    -DLIB_PICO_STDIO_USB=0

    ; ===================================================================
    ; I2S Audio (no HW present; GPIO20 is UART1 TX debug probe)
    ; ===================================================================
    -DPICO_AUDIO_I2S_DATA_PIN=28
    -DPICO_AUDIO_I2S_CLOCK_PIN_BASE=21
    -DNO_USE_UART=1
    -DPICO_STDIO_UART=0
    -DLIB_PICO_STDIO_UART=0

    ; ===================================================================
    ; WAD address & flash size
    ; ===================================================================
    -DUSE_SD_WAD=1
    -DRP2350_PSRAM_CS=19
    -DPICO_FLASH_SIZE_BYTES=16777216

    ; ===================================================================
    ; Compiler flags
    ; ===================================================================
    -Wall
    -Wno-unused-function
    -Wno-unused-but-set-variable
    -Wno-unused-variable
    -Wno-format-truncation
    -fms-extensions
    -fdata-sections
    -fno-common
    -Os

    ; ===================================================================
    ; Linker flags (malloc/calloc/free wrappers for zone allocator)
    ; printf/vprintf/puts/putchar wraps are no-ops (doom_stub.c) —
    ; SDK symbols weakened in doom_build.py so our versions win.
    ; ===================================================================
    -Wl,--wrap=malloc
    -Wl,--wrap=calloc
    -Wl,--wrap=free
    -Wl,--wrap=printf
    -Wl,--wrap=vprintf
    -Wl,--wrap=puts
    -Wl,--wrap=putchar
    -Wl,--wrap=fprintf
    -Wl,--sort-section=alignment

    ; ===================================================================
    ; Include paths (supplement doom_build.py)
    ; ===================================================================
    -Ilib/rp2040-doom/boards
    -include lib/rp2040-doom/boards/jtbd16.h

    ; ===================================================================
    ; Petit FatFS (SD card WAD loading at boot via SPI0)
    ; ===================================================================
    -Ilib/petit_fatfs

    ; ===================================================================
    ; PIO SPI OLED driver
    ; ===================================================================
    -Isrc

monitor_speed = 115200
monitor_filters =
    default
    time
debug_tool = cmsis-dap
upload_protocol = cmsis-dap
