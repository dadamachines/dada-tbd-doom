name: Build TBD App

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      #- name: Run Unit Tests
      #  run: pio test -e tests

      - name: Build Firmware
        run: pio run -e pi2350

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: tbd_frontend
          path: |
            .pio/build/pi2350/firmware.bin
            .pio/build/pi2350/firmware.uf2
          overwrite: true

  # Publish to the dadamachines firmware CDN on tagged releases.
  # Requires a PICO_CDN_TOKEN secret — a fine-grained GitHub PAT scoped
  # to dadamachines/dada-tbd-firmware with Contents: write permission.
  # Ask dadamachines for a token if you're a trusted contributor.
  # This job is skipped silently if the secret is not set (forks/community).
  publish-cdn:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check for CDN token
        id: check
        run: |
          if [ -z "${{ secrets.PICO_CDN_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::PICO_CDN_TOKEN not set — skipping CDN publish"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: tbd_frontend
          path: pico-artifact

      - name: Compute SHA-256
        if: steps.check.outputs.skip != 'true'
        id: sha
        run: |
          SHA=$(sha256sum pico-artifact/firmware.uf2 | cut -d' ' -f1)
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "SHA-256: $SHA"

      - name: Dispatch to CDN
        if: steps.check.outputs.skip != 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PICO_CDN_TOKEN }}
          repository: dadamachines/dada-tbd-firmware
          event-type: pico-app-update
          client-payload: >-
            {
              "channel": "stable",
              "app_id": "${{ github.event.repository.name }}",
              "version": "${{ github.ref_name }}",
              "run_id": "${{ github.run_id }}",
              "sha256": "${{ steps.sha.outputs.sha256 }}",
              "repository": "${{ github.repository }}",
              "artifact_name": "tbd_frontend"
            }
          overwrite: true